<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Home System — Detroit</title>
<style>
:root{--sage:#2A6048;--sage-lt:#E8F5EE;--sage-bd:#A3C9B4;--red:#B91C1C;--amber:#A0510A;--blue:#1A4F82;--border:rgba(0,0,0,.09);--muted:#6B7280;--text:#111827;--bg:#F4F5F7;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:#fff;border-bottom:.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.topbar-left h1{font-size:15px;font-weight:500;}.topbar-left p{font-size:11px;color:var(--muted);}
.module-tabs{display:flex;gap:6px;}
.module-tab{padding:6px 14px;border-radius:20px;border:.5px solid var(--border);background:#f5f5f5;font-size:12px;cursor:pointer;color:var(--muted);}
.module-tab.active{background:var(--sage);color:#fff;border-color:var(--sage);font-weight:500;}
.main{max-width:740px;margin:0 auto;padding:16px;}
/* Year bar */
.year-bar{height:8px;display:flex;border-radius:6px;overflow:hidden;gap:2px;margin-bottom:5px;}
.yr{flex:1;opacity:.22;transition:opacity .2s;}.yr.active{opacity:1;}
.year-labels{display:flex;margin-bottom:16px;}
.yl{flex:1;text-align:center;font-size:10px;color:#aaa;}.yl.active{font-weight:500;color:var(--text);}
/* Season nav */
.season-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.s-btn{padding:10px 4px 8px;border-radius:10px;border:.5px solid var(--border);background:#fff;cursor:pointer;text-align:center;position:relative;}
.s-btn .si{font-size:16px;display:block;margin-bottom:2px;}.s-btn .sl{font-size:12px;color:var(--muted);display:block;}.s-btn .sm{font-size:10px;color:#bbb;display:block;}
.s-btn.active{border-width:2px;}
.now-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:500;color:#fff;padding:1px 6px;border-radius:6px;white-space:nowrap;}
/* Season summary */
.season-box{border-radius:10px;padding:14px 16px;margin-bottom:14px;border:.5px solid transparent;}
.season-box .sb-title{font-size:15px;font-weight:500;margin-bottom:4px;}
.season-box .sb-desc{font-size:12px;color:#555;line-height:1.5;}
.season-box .sb-stats{display:flex;gap:20px;margin-top:10px;}
.stat-n{font-size:20px;font-weight:500;}.stat-l{font-size:10px;color:var(--muted);}
/* Category accordion */
.category{background:#fff;border:.5px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden;}
.cat-hd{padding:11px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:#F8F9FA;}
.cat-hd:hover{background:#F0F1F3;}
.cat-left{display:flex;align-items:center;gap:8px;}
.cat-name{font-size:13px;font-weight:500;}
.cat-count{font-size:11px;background:#E5E7EB;color:var(--muted);padding:1px 7px;border-radius:10px;}
.cat-urg{font-size:11px;background:#FEE2E2;color:#991B1B;padding:1px 7px;border-radius:10px;}
.cat-arr{font-size:11px;color:var(--muted);transition:transform .2s;}
.cat-arr.open{transform:rotate(180deg);}
.cat-body{padding:10px 12px;display:none;}
.cat-body.open{display:block;}
/* Tasks */
.task{background:#fff;border:.5px solid #eee;border-radius:8px;padding:11px 13px 11px 15px;margin-bottom:7px;}
.task.pc{border-left:3px solid #DC2626;}.task.ph{border-left:3px solid #EF4444;}.task.pm{border-left:3px solid #F59E0B;}.task.pl{border-left:3px solid #22C55E;}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
.task-name{font-size:13px;font-weight:500;}.task-desc{font-size:12px;color:#555;line-height:1.55;}
.task-note{margin-top:7px;padding:6px 10px;background:#FFFBEB;border-left:2px solid #F59E0B;border-radius:5px;font-size:11px;color:#78350F;line-height:1.5;}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.badge.pc{background:#FEE2E2;color:#991B1B;}.badge.ph{background:#FEF3F2;color:#B91C1C;}.badge.pm{background:#FFFBEB;color:#92400E;}.badge.pl{background:#F0FDF4;color:#166534;}
/* Detroit watch */
.dw{background:#F0F7FD;border:.5px solid rgba(181,212,244,.4);border-radius:10px;padding:14px 16px;margin-top:4px;}
.dw-t{font-size:12px;font-weight:500;color:var(--blue);margin-bottom:8px;}
.dw-i{font-size:12px;color:#374151;display:flex;gap:8px;margin-bottom:6px;line-height:1.5;}
/* Kitchen tabs */
.k-tabs{display:flex;overflow-x:auto;gap:5px;padding-bottom:0;border-bottom:.5px solid var(--border);margin-bottom:16px;scrollbar-width:none;}
.k-tab{display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:7px 7px 0 0;border:.5px solid rgba(0,0,0,.1);border-bottom:2px solid transparent;background:#F8F9FA;cursor:pointer;white-space:nowrap;font-size:12px;color:var(--muted);}
.k-tab.active{background:var(--sage-lt);color:var(--sage);border-bottom-color:var(--sage);font-weight:500;}
.k-tab.safety.active{background:#FEF2F2;color:#991B1B;border-bottom-color:#991B1B;}
/* Cards */
.card{background:#fff;border:.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.card-hd{padding:11px 16px;border-bottom:.5px solid rgba(0,0,0,.06);background:#F8F9FA;font-size:13px;font-weight:500;}
.card-bd{padding:14px 16px;}
/* Tags */
.tag{padding:8px 12px;border-radius:7px;margin-bottom:7px;display:flex;gap:8px;align-items:flex-start;font-size:12px;line-height:1.55;}
.do-tag{background:#F0FDF4;color:#166534;border-left:3px solid #22C55E;}
.dont-tag{background:#FEF2F2;color:#991B1B;border-left:3px solid #EF4444;}
.rule-tag{background:#F0F9FF;color:#075985;border-left:3px solid #38BDF8;}
.note-tag{background:#FFFBEB;color:#92400E;border-left:3px solid #F59E0B;}
/* Checklist */
.cl-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:.5px solid rgba(0,0,0,.05);cursor:pointer;}
.cl-item:last-child{border-bottom:none;}
.chkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(0,0,0,.2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:transparent;transition:all .15s;}
.chkbox.on{background:var(--sage);border-color:var(--sage);}
.chkbox.on::after{content:'✓';color:#fff;font-size:10px;}
.cl-label{font-size:12px;color:#374151;line-height:1.5;}
.cl-label.on{color:#9CA3AF;text-decoration:line-through;}
/* Zone grid */
.zone-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.z-btn{padding:9px 11px;border-radius:9px;cursor:pointer;text-align:left;border:1.5px solid rgba(0,0,0,.1);background:#FAFAFA;}
.z-btn .zi{font-size:15px;margin-bottom:2px;display:block;}.z-btn .zl{font-size:11px;font-weight:500;display:block;}.z-btn .zs{font-size:10px;color:#9CA3AF;display:block;}
.zone-detail{border-radius:10px;border:.5px solid rgba(0,0,0,.1);overflow:hidden;margin-bottom:14px;}
.zd-hd{padding:11px 16px;font-size:13px;font-weight:500;border-bottom:.5px solid rgba(0,0,0,.07);}
.zd-bd{padding:12px 16px;}
.zd-row{font-size:12px;color:#374151;padding:6px 0;border-bottom:.5px solid rgba(0,0,0,.06);display:flex;gap:8px;}
.zd-row:last-child{border-bottom:none;}
/* Row util */
.row-item{display:flex;gap:12px;padding:8px 0;border-bottom:.5px solid rgba(0,0,0,.06);font-size:12px;}
.row-item:last-child{border-bottom:none;}
.ri-label{font-weight:500;min-width:110px;flex-shrink:0;color:var(--sage);}
.ri-val{color:#4B5563;line-height:1.5;}
/* Pantry group */
.pg{padding:8px 10px;border-radius:6px;background:#F8F9FA;margin-bottom:6px;display:flex;gap:12px;align-items:flex-start;}
.pg-cat{font-size:11px;font-weight:500;color:var(--sage);min-width:130px;flex-shrink:0;}
.pg-ex{font-size:11px;color:#6B7280;}
/* Towel system */
.towel{padding:9px 12px;border-radius:7px;margin-bottom:7px;}
.tw-l{font-size:12px;font-weight:500;margin-bottom:3px;}
.tw-r{font-size:11px;color:#4B5563;line-height:1.5;}
/* Danger zone */
.dz-box{padding:14px;border-radius:8px;background:#FEF2F2;margin-bottom:14px;text-align:center;}
.dz-temp{font-size:22px;font-weight:500;color:#B91C1C;}
.dz-sub{font-size:11px;color:#9CA3AF;margin-top:4px;}
/* Fridge */
.fr-row{display:flex;gap:12px;padding:8px 0;border-bottom:.5px solid rgba(0,0,0,.06);}
.fr-row:last-child{border-bottom:none;}
.fr-shelf{font-size:11px;font-weight:500;min-width:90px;flex-shrink:0;}
.fr-val{font-size:12px;color:#4B5563;line-height:1.5;}
/* Meal template */
.meal{padding:11px 0;border-bottom:.5px solid rgba(0,0,0,.07);}
.meal:last-child{border-bottom:none;}
.meal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.meal-name{font-size:13px;font-weight:500;}
.meal-time{font-size:10px;background:var(--sage-lt);color:var(--sage);padding:2px 8px;border-radius:10px;}
.meal-desc{font-size:12px;color:#4B5563;margin-bottom:4px;}
.meal-ex{font-size:11px;color:#9CA3AF;font-style:italic;}
/* Always 5 */
.a5{padding:9px 0;border-bottom:.5px solid rgba(0,0,0,.07);}
.a5:last-child{border-bottom:none;}
.a5-cat{font-size:12px;font-weight:500;margin-bottom:3px;}
.a5-ex{font-size:11px;color:#6B7280;}
/* Counter split */
.counter-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.cg-t{font-size:11px;font-weight:500;margin-bottom:8px;letter-spacing:.4px;}
.cg-i{font-size:12px;color:#374151;padding:4px 0;display:flex;gap:6px;}
/* Daily reset */
.daily-reset{margin-bottom:16px;padding:12px 16px;background:var(--sage-lt);border-radius:10px;border:.5px solid var(--sage-bd);}
.dr-title{font-size:11px;font-weight:500;color:var(--sage);margin-bottom:8px;letter-spacing:.4px;}
/* Print links */
.print-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.print-link{font-size:11px;padding:5px 12px;border-radius:20px;border:.5px solid var(--border);background:#fff;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.print-link:hover{border-color:var(--sage);color:var(--sage);}
.hidden{display:none!important;}
.footer{text-align:center;font-size:11px;color:#9CA3AF;padding:20px;}
@media(max-width:600px){.topbar{flex-direction:column;}.counter-grid{grid-template-columns:1fr;}.season-nav{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><h1>🏡 Swift Home System</h1><p>Detroit, MI · 1930s Home</p></div>
  <div class="module-tabs">
    <button class="module-tab active" data-mod="seasonal">🏡 Seasonal</button>
    <button class="module-tab" data-mod="kitchen">🍴 Kitchen</button>
  </div>
</div>
<main class="main">

<!-- ── SEASONAL MODULE ──────────────────────────── -->
<div id="mod-seasonal">
  <div class="year-bar" id="year-bar"></div>
  <div class="year-labels" id="year-labels"></div>
  <div class="season-nav" id="season-nav"></div>
  <div class="print-links">
    <span style="font-size:11px;color:var(--muted);align-self:center;">Print cards →</span>
    <a class="print-link" href="cards/seasonal.pdf" target="_blank">📋 Seasonal checklist</a>
    <a class="print-link" href="cards/food-safety.pdf" target="_blank">🛡 Food safety</a>
    <a class="print-link" href="cards/kitchen-reset.pdf" target="_blank">✅ Kitchen reset</a>
  </div>
  <div id="season-content"></div>
</div>

<!-- ── KITCHEN MODULE ──────────────────────────── -->
<div id="mod-kitchen" class="hidden">
  <div class="daily-reset">
    <div class="dr-title">DAILY KITCHEN RESET — 5 NON-NEGOTIABLES</div>
    <div id="daily-checklist"></div>
  </div>
  <div class="k-tabs" id="k-tabs"></div>
  <div id="k-content"></div>
</div>

</main>
<div class="footer">Swift Home System · github.io · trevon-swift</div>
<script>
// ── DATA ───────────────────────────────────────────────────────────────────

    desc:"Post-winter recovery and system prep. Damage assessment and seasonal transitions.",

    detroit:["Detroit average January low is 18°F with multi-day stretches below 0°F — pipes in exterior walls are always at risk","Ice dam season Dec–Feb: watch eaves carefully after every snowfall event","Gas leaks are harder to detect in winter when windows stay closed — trust your CO detector","DTE Energy offers weatherization assistance programs — worth checking for insulation and air-sealing rebates"]}
};

const SEASONAL = {
  spring:[
    {cat:"🏠 Structure & Exterior",tasks:[
      {p:"high",t:"Roof inspection",d:"Check 3–5yr shingles for winter damage, lifted edges, missing granules, and flashing around chimney/vents. Document issues for warranty claims.",n:"Look for granule loss in downspouts — a sign of shingle degradation even on newer installs"},
      {p:"high",t:"Gutter cleaning & downspout flush",d:"Clear winter debris. Run water through downspouts and verify drainage directs 6ft+ away from foundation.",n:"Clogged downspouts = basement moisture. Confirm drainage away from foundation before ground thaws."},
      {p:"high",t:"Foundation crack inspection",d:"Walk the full perimeter and check for new cracks from freeze-thaw. Mark any cracks with a pencil and date them to monitor growth.",n:"Horizontal cracks → structural engineer. Vertical hairline cracks → monitor quarterly and seal in fall"},
      {p:"medium",t:"Exterior caulk & paint check",d:"Inspect all wood trim, window frames, and joints. 1930s homes need annual sealing to prevent moisture intrusion.",n:"Flaking paint pre-1978 may contain lead — test before sanding or disturbing"},
      {p:"medium",t:"Window & door seal check",d:"Check weatherstripping integrity and glazing compound on original windows after winter stress.",n:null}
    ]},
    {cat:"🌡 HVAC & Heating",tasks:[
      {p:"high",t:"AC component inspection",d:"Schedule a licensed HVAC tech to check the cooling side: refrigerant charge, condenser coils, electrical connections. 2–5yr unit — confirm cooling warranty coverage.",n:"Don't wait until the first heat wave — a mid-summer breakdown costs more in emergency rates"},
      {p:"high",t:"Replace furnace filter",d:"Spring swap before switching to cooling mode. Use MERV 8–11 for older ductwork typical in 1930s homes.",n:null},
      {p:"medium",t:"Thermostat calibration check",d:"Verify thermostat accuracy. Consider upgrading to a smart thermostat if you still have an older model.",n:null}
    ]},
    {cat:"💧 Plumbing & Water",tasks:[
      {p:"high",t:"Sump pump test",d:"Pour water into the sump pit and verify the pump activates before the first thaw. Detroit's snowmelt flooding risk is real. 7+ year old pump → plan replacement.",n:"Consider a battery-backup sump pump — spring storms can knock out power exactly when you need it most"},

      {p:"medium",t:"Water heater visual inspection",d:"Tank is new — verify no early corrosion, moisture, or drips. Confirm T&P relief valve is accessible.",n:"New unit: double-check warranty registration is complete and save your install paperwork"}
    ]},
    {cat:"⚡ Safety & Systems",tasks:[
      {p:"critical",t:"Basement hazmat assessment — BEFORE any cleaning",d:"Before any cleaning, sweeping, or disturbing basement materials, hire a certified inspector to test for asbestos (pipe wrap, floor tiles, ceiling), lead paint, and mold. Non-optional for a 1930s structure.",n:"Asbestos inspection: $200–$500. Do not vacuum, sweep, or disturb any materials until professionally cleared."},
      {p:"high",t:"Smoke & CO detector test",d:"Test all units, replace batteries on every unit. CO detectors on every floor including basement. Replace any unit 10+ years old.",n:null}

  ],
  summer:[

    {cat:"🌡 HVAC & Heating",tasks:[

const SEASONS_ORDER = ["spring","summer","fall","winter"];

const getCurrentSeason = () => {
  const m = new Date().getMonth()+1;
  if(m>=3&&m<=5) return "spring";
  if(m>=6&&m<=8) return "summer";
  if(m>=9&&m<=11) return "fall";
  return "winter";
};

const getDayPct = () => {
  const now = new Date();
  const start = new Date(now.getFullYear(),0,0);
  return Math.round(((now-start)/(1000*60*60*24)/365)*1000)/10;
};

let currentKTab = "zones";
let activeZone = "prep";

function renderSeasonNav() {
  const meta = SEASON_META;
  $("season-nav").innerHTML = SEASONS_ORDER.map(s=>{

    return `<button class="s-btn${isActive?" active":""}" data-season="${s}" style="${style}">

function renderSeasonContent() {
  const meta = SEASON_META[currentSeason];
  const cats = SEASONAL[currentSeason];
  let total=0, urgent=0, crit=0;
  cats.forEach(c=>c.tasks.forEach(t=>{total++;if(t.p==="high"||t.p==="critical")urgent++;if(t.p==="critical")crit++;}));
  const pm = PRIORITY_MAP;
  let html = `<div class="season-box" style="background:${meta.bg};border-color:${meta.color}22;">
    <div class="sb-title" style="color:${meta.color};">${meta.icon} ${meta.label} maintenance</div>
    <div class="sb-desc">${meta.desc}</div>
    <div class="sb-stats">
      <div><div class="stat-n" style="color:${meta.color};">${total}</div><div class="stat-l">tasks</div></div>
      <div><div class="stat-n" style="color:#B91C1C;">${urgent}</div><div class="stat-l">urgent</div></div>
      ${crit>0?`<div><div class="stat-n" style="color:#DC2626;">${crit}</div><div class="stat-l">critical</div></div>`:""}
    </div>
  </div>`;
  cats.forEach((c,ci)=>{
    const catKey = currentSeason+"-"+ci;
    const isOpen = openCats[catKey]!==false;
    const urgCount = c.tasks.filter(t=>t.p==="high"||t.p==="critical").length;
    html += `<div class="category">
      <div class="cat-hd" data-cat="${catKey}">
        <div class="cat-left">
          <span class="cat-name">${c.cat}</span>
          <span class="cat-count">${c.tasks.length}</span>
          ${urgCount>0?`<span class="cat-urg">${urgCount} urgent</span>`:""}
        </div>
        <span class="cat-arr${isOpen?" open":""}">▼</span>
      </div>
      <div class="cat-body${isOpen?" open":""}">`;
    c.tasks.forEach(task=>{
      const pr = pm[task.p];
      html += `<div class="task ${pr.cls}">
        <div class="task-top">
          <span class="task-name">${escHtml(task.t)}</span>
          <span class="badge ${pr.cls}">${pr.label}</span>
        </div>
        <div class="task-desc">${escHtml(task.d)}</div>
        ${task.n?`<div class="task-note">⚡ ${escHtml(task.n)}</div>`:""}
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="dw">
    <div class="dw-t">🔍 Detroit watch — ${meta.label.toLowerCase()} specific risks</div>
    ${meta.detroit.map(d=>`<div class="dw-i"><span style="color:#1A4F82;flex-shrink:0;">→</span>${escHtml(d)}</div>`).join("")}
  </div>`;
  $("season-content").innerHTML = html;
}

    html += `<div class="card"><div class="card-hd" style="background:var(--sage-lt);color:var(--sage);">The quick-meal formula</div><div class="card-bd">
      <div style="text-align:center;padding:12px 0;font-size:14px;">
        <span style="font-weight:500;color:#B91C1C;">Protein</span><span style="color:#9CA3AF;margin:0 8px;">+</span><span style="font-weight:500;color:#1A4F82;">Grain</span><span style="color:#9CA3AF;margin:0 8px;">+</span><span style="font-weight:500;color:#166534;">Vegetable</span><span style="color:#9CA3AF;margin:0 8px;">+</span><span style="font-weight:500;color:#9E3A1A;">Sauce</span>
      </div>
      <div class="tag rule-tag"><span>→</span>Every quick weeknight meal is a variation on this formula. Once you see that, the pantry system and the meal system become the same system.</div>
    </div></div>`;
    html += `<div class="card"><div class="card-hd">Sunday micro-prep session — 30 to 45 minutes</div><div class="card-bd">
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">Don't prep full meals. Prep components. Components are flexible — full meals aren't.</p>
      <div id="prep-cl"></div>
      <div class="tag note-tag" style="margin-top:10px;"><span>⚡</span>30 minutes on Sunday eliminates the 'what do I eat' decision Monday through Wednesday — the hardest nights of the week.</div>
    </div></div>`;
    html += `<div class="card"><div class="card-hd">3 weeknight templates</div><div class="card-bd">
      ${[["Bowl meal","10–15 min","Grain (from prep) + protein + vegetable + sauce. Heat, combine, done.","Rice + canned chickpeas + frozen broccoli + soy sauce & sesame oil"],["Pasta + sauce","15–20 min","Boil pasta while heating sauce. Add any protein or vegetable. Keeps as next-day lunch.","Pasta + jarred marinara + canned tuna + frozen spinach"],["Wrap or quesadilla","5–10 min","Tortilla + protein + vegetable + condiment. Fast, minimal dishes, endlessly flexible.","Tortilla + leftover chicken + cheese + hot sauce + any fresh veg"]].map(([n,ti,d,e])=>`<div class="meal"><div class="meal-top"><span class="meal-name">${n}</span><span class="meal-time">${ti}</span></div><div class="meal-desc">${d}</div><div class="meal-ex">e.g. ${e}</div></div>`).join("")}
    </div></div>`;
  }

  else if(t==="safety") {
    html += `<div class="card"><div class="card-hd" style="background:#FEF2F2;color:#991B1B;">⚠ The towel problem — how to fix it</div><div class="card-bd">
      <div class="tag dont-tag"><span>✗</span>Never dry a clean dish with the same cloth that touched a counter surface. This transfers bacteria directly onto items you're about to eat from.</div>
      <div style="margin:12px 0;">
        <div style="font-size:12px;font-weight:500;color:#111827;margin-bottom:8px;">3-towel color system — buy different colors for each job:</div>
        <div class="towel" style="background:#EFF6FF;border-left:3px solid #1A5FA5;"><div class="tw-l" style="color:#1A5FA5;">Blue — dish drying only</div><div class="tw-r">Drying clean dishes and cookware only. Change every 1–2 days. Never use for wiping counters or hands.</div></div>
        <div class="towel" style="background:#F0FDF4;border-left:3px solid #166534;"><div class="tw-l" style="color:#166534;">Green — hand drying only</div><div class="tw-r">Drying your hands after washing. Change every 1–2 days. Completely separate from the dish towel.</div></div>
        <div class="towel" style="background:#FEF2F2;border-left:3px solid #991B1B;"><div class="tw-l" style="color:#991B1B;">Red — counter & surfaces</div><div class="tw-r">Wiping down surfaces, spills, stovetop. Change daily. Replace immediately after raw meat contact — not end of session.</div></div>
      </div>
      <div class="tag do-tag"><span>✓</span>Buy a 6-pack of each color. Wash all kitchen textiles together on hot once a week. Store clean ones in one dedicated drawer.</div>
    </div></div>`;
    html += `<div class="card"><div class="card-hd">Temperature danger zone</div><div class="card-bd">
      <div class="dz-box"><div style="font-size:11px;color:#9CA3AF;margin-bottom:5px;">Bacteria doubles every 20 minutes in this range</div><div class="dz-temp">40°F — 140°F</div><div class="dz-sub">the danger zone</div></div>
      ${[["2-hour rule","Cooked food left out for 2+ hours → throw it out. In a hot room (90°F+) that drops to 1 hour."],["Defrost in the fridge","Never defrost on the counter. Move frozen protein to the fridge the night before you need it."],["Fridge at 40°F or below","Check temperature seasonally. Older fridges may not hold consistently — a fridge thermometer is $10."],["Cool before storing","Let cooked food cool 30–45 min before refrigerating. Then refrigerate — don't let it sit for hours."]].map(([r,d],i,a)=>`<div style="padding:8px 0;${i<a.length-1?"border-bottom:.5px solid rgba(0,0,0,.07);":""}"><div style="font-size:12px;font-weight:500;color:#111827;margin-bottom:3px;">${r}</div><div style="font-size:12px;color:#6B7280;">${d}</div></div>`).join("")}
    </div></div>`;
    html += `<div class="card"><div class="card-hd">Fridge storage hierarchy</div><div class="card-bd">
      ${[["Top shelf","#1A5FA5","Ready-to-eat foods, leftovers in sealed containers labeled with date"],["Middle shelf","#2A6048","Dairy, eggs, opened beverages, condiments used regularly"],["Bottom shelf","#B91C1C","Raw meat — always sealed, always on the bottom. If it drips, it drips down, not onto your food."],["Crisper drawers","#166534","Vegetables and fruit in separate drawers if you have two"],["Door shelves","#92400E","Condiments, hot sauce, soda only — never eggs or opened dairy (it's the warmest zone)"]].map(([s,c,v])=>`<div class="fr-row"><span class="fr-shelf" style="color:${c};">${s}</span><span class="fr-val">${v}</span></div>`).join("")}
    </div></div>`;
    html += `<div class="card"><div class="card-hd">Cross-contamination — non-negotiables</div><div class="card-bd">
      <div class="tag rule-tag"><span>→</span>Two cutting boards minimum. One for produce and bread. One for raw protein. Different colors so there's never any ambiguity.</div>
      <div class="tag dont-tag"><span>✗</span>Never rinse raw chicken. Rinsing spreads bacteria via water splash to the sink, counter, and anything nearby. Pat dry with a paper towel instead.</div>
      <div class="tag do-tag"><span>✓</span>Wash hands for 20 seconds with soap after handling raw meat. Not a quick rinse — 20 full seconds of scrubbing.</div>
      <div class="tag dont-tag"><span>✗</span>Never put cooked food back on any surface that held raw food — the cutting board, pan, plate, or that section of counter.</div>
    </div></div>`;
    html += `<div class="card"><div class="card-hd">Utensil availability — fixing the ran-out problem</div><div class="card-bd">
      <div class="tag rule-tag"><span>→</span>Running out of utensils means you don't own enough, or you're not washing them frequently enough. Both are solvable.</div>
      <div style="margin:10px 0;"><div style="font-size:12px;font-weight:500;color:#111827;margin-bottom:8px;">5 critical-path utensils — the ones that block cooking when dirty:</div>
        ${["Chef's knife","Cutting board (×2: one produce, one protein)","Main cooking pan","Spatula or wooden spoon","Large mixing bowl"].map(i=>`<div style="font-size:12px;color:#374151;padding:4px 0;display:flex;gap:8px;"><span style="color:var(--sage);">→</span>${i}</div>`).join("")}
      </div>
      <div class="tag do-tag"><span>✓</span>Wash critical-path utensils immediately after use — not at end of the night. This eliminates the 'everything's dirty' block mid-session.</div>
      <div class="tag rule-tag"><span>→</span>Dishes done before bed, every night. This single habit prevents the cascading 'all my bowls are dirty' failure mode.</div>
    </div></div>`;
  }

  $("k-content").innerHTML = html;

  // Render sub-checklists if present
  if(t==="counter"&&$("counter-cl")) renderSubCL("counter-cl","swift-counter",["Clear everything off the prep zone counter","Non-kitchen items go to their actual home right now","Appliances not used today go in a cabinet","Wipe the surface with a clean, damp counter cloth","Keep the prep zone clear until cooking and cleanup is done"]);
  if(t==="inventory"&&$("inv-cl")) renderSubCL("inv-cl","swift-inv",["Open the pantry and scan all shelves (30 seconds — just look)","Check the 5 always-stocked categories — anything low or out?","Spot-check expiry dates on anything that looks old","Add missing items to the low/out list","Check the fridge for anything about to expire → plan a meal around it this week"]);
  if(t==="mealprep"&&$("prep-cl")) renderSubCL("prep-cl","swift-prep",["Cook one batch grain: rice, pasta, or quinoa (lasts 4–5 days in fridge)","Wash and rough-chop any fresh vegetables you bought","Hard-boil 4–6 eggs if you eat them — grab-and-go protein for the week","Open or make one sauce or dressing to have ready","Move proteins from freezer to fridge to thaw for Mon/Tue use"]);
}

function renderSubCL(elId, storageKey, items) {
  const state = loadCL(storageKey);
  const el = $(elId);
  if(!el) return;
  el.innerHTML = items.map((item,i)=>{
    const on = state[i]||false;
    return `<div class="cl-item" data-subcl="${storageKey}" data-idx="${i}">
      <div class="chkbox${on?" on":""}"></div>
      <span class="cl-label${on?" on":""}">${escHtml(item)}</span>
    </div>`;
  }).join("");
}

// ── MAIN RENDER ────────────────────────────────────────────────────────────

function renderSeasonal() {
  renderYearBar();
  renderSeasonNav();
  renderSeasonContent();
}

function renderKitchen() {
  renderDailyChecklist();
  renderKTabs();
  renderKContent();
}

function switchModule(mod) {
  currentModule = mod;
  $("mod-seasonal").classList.toggle("hidden", mod!=="seasonal");
  $("mod-kitchen").classList.toggle("hidden", mod!=="kitchen");
  document.querySelectorAll(".module-tab").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.mod===mod);
  });
  if(mod==="seasonal") renderSeasonal();
  else renderKitchen();
}

// ── EVENT DELEGATION ───────────────────────────────────────────────────────

document.addEventListener("click", e => {
  // Module switch
  const modBtn = e.target.closest(".module-tab");
  if(modBtn) { switchModule(modBtn.dataset.mod); return; }

  // Season select
  const sBtn = e.target.closest(".s-btn");
  if(sBtn) { currentSeason=sBtn.dataset.season; openCats={}; renderSeasonal(); return; }

  // Category accordion
  const catHd = e.target.closest(".cat-hd");
  if(catHd) {
    const key = catHd.dataset.cat;
    openCats[key] = openCats[key]===false ? true : false;
    const body = catHd.nextElementSibling;
    const arr = catHd.querySelector(".cat-arr");
    if(openCats[key]===false){ body.classList.remove("open"); arr.classList.remove("open"); }
    else { body.classList.add("open"); arr.classList.add("open"); }
    return;
  }

  // Zone select
  const zBtn = e.target.closest(".z-btn");
  if(zBtn) { activeZone=zBtn.dataset.zone; renderKContent(); return; }

  // Kitchen tab
  const kTab = e.target.closest(".k-tab");
  if(kTab) { currentKTab=kTab.dataset.ktab; renderKTabs(); renderKContent(); return; }

  // Daily checklist
  const dailyItem = e.target.closest(".cl-item[data-daily]");
  if(dailyItem) {
    const i = parseInt(dailyItem.dataset.daily);
    dailyState[i] = !dailyState[i];
    saveCL("swift-daily", dailyState);
    renderDailyChecklist();
    return;
  }

  // Sub-checklists
  const subCL = e.target.closest(".cl-item[data-subcl]");
  if(subCL) {
    const key = subCL.dataset.subcl;
    const idx = parseInt(subCL.dataset.idx);
    const state = loadCL(key);
    state[idx] = !state[idx];
    saveCL(key, state);
    renderSubCL(subCL.closest("[id]").id, key, subCL.closest("[id]").querySelectorAll(".cl-item").length ? Array.from(subCL.closest("[id]").querySelectorAll(".cl-label")).map(el=>el.textContent) : []);
    // Re-render the whole kitchen content to refresh the checklist
    renderKContent();
    return;
  }
});

// ── INIT ───────────────────────────────────────────────────────────────────

renderSeasonal();
</script>
</body>
</html>
